services:
  fleet:
    build: .
    container_name: fleet
    restart: unless-stopped
    ports:
      - '9100:9100'
    volumes:
      # Claude Code auth and session data
      - ~/.claude:/home/node/.claude
      # Config file (mount your own config.json)
      - ./config.json:/app/config.json:ro
    environment:
      - NODE_ENV=production
      - FLEET_CONFIG=/app/config.json
      - HEALTH_PORT=9100
      # Optional: override with env vars instead of config.json
      # - FEISHU_APP_ID=cli_xxx
      # - FEISHU_APP_SECRET=xxx
